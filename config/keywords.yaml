# Keyword groups for tender filtering.
# - phrases: substring match, case-insensitive
# - tokens:  whole-word match, case-insensitive (use for short proper
#            nouns where a substring would yield false positives;
#            tokens with whitespace are rejected — multi-word names
#            belong in phrases)
# - exclude_if_contains: if ANY of these is present, the group does
#            NOT match, regardless of phrases/tokens
groups:
  credit_rating:
    phrases:
      # --- Russian: "кредитный рейтинг" inflections ---
      - "кредитный рейтинг"
      - "кредитного рейтинга"
      - "кредитному рейтингу"
      - "кредитным рейтингом"
      - "кредитном рейтинге"
      - "кредитные рейтинги"
      - "кредитных рейтингов"
      - "кредитным рейтингам"

      # --- Russian: "рейтинг кредитоспособности" ---
      - "рейтинг кредитоспособности"
      - "рейтинга кредитоспособности"
      - "рейтингу кредитоспособности"
      - "рейтингом кредитоспособности"
      - "рейтинге кредитоспособности"
      - "кредитоспособность эмитента"
      - "кредитоспособности эмитента"

      # --- Russian: rating assignment / methodology ---
      - "присвоение рейтинга"
      - "присвоении рейтинга"
      - "присвоение кредитного рейтинга"
      - "пересмотр кредитного рейтинга"
      - "подтверждение рейтинга"
      - "подтверждении рейтинга"
      - "рейтинговая оценка"
      - "рейтинговой оценки"
      - "рейтинговое заключение"
      - "рейтингового заключения"

      # --- Named rating agencies ---
      - "Эксперт РА"
      - "Эксперт РА Казахстан"
      - "Эксперт РА Узбекистан"
      - "RAEX-Europa"
      - "АКРА-Казахстан"
      - "S&P Global Ratings"
      - "S&P Global"
      - "Standard & Poor's"
      - "Standard and Poor's"
      - "Sustainable Fitch"
      - "Fitch Ratings"
      - "Moody's Investors Service"
      - "Moody's ESG Solutions"
      - "DBRS Morningstar"

      # --- English: credit / rating phrases ---
      - "credit rating"
      - "credit ratings"
      - "credit rating agency"
      - "credit rating assignment"
      - "credit assessment"
      - "credit risk assessment"
      - "creditworthiness assessment"
      - "creditworthiness"
      - "credit watch"
      - "investment grade"
      - "speculative grade"
      - "issuer credit rating"
      - "long-term rating"
      - "short-term rating"

      # --- Uzbek: credit rating ---
      - "kredit reytingi"
      - "kredit reytinglari"
      - "kredit reytingini"
      - "kredit reytinglarini"
      - "kreditga layoqatlilik"
      - "kreditga qobiliyatlilik"

    tokens:
      # Stable, mostly-unambiguous acronyms / agency short names.
      - АКРА
      - RAEX
      - Moody's
      - Fitch
      - DBRS
      - ICRA
      - JCR

    exclude_if_contains:
      # Consumer credit products that share the word "credit/кредит"
